---
- name: Créer le répertoire de l'application
  file:
    path: /opt/app
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Déployer une configuration applicative minimale
  copy:
    content: |
      APP_NAME=devops-app
      APP_ENV=production
      APP_PORT=3000
    dest: /opt/app/.env
    mode: '0644'
